<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stonr Control</title>
  <link rel="stylesheet" href="style.css?v=stonr-control-20260322a">
</head>
<body class="stonr-booting">
  <div class="boot-splash" aria-hidden="true">
    <div class="boot-mark">
      <img src="assets/icons/web/icon-192.png" alt="Stonr logo">
    </div>
  </div>
  <div class="shell">
    <aside class="rail">
      <section class="nav-block">
        <div class="section-head">
          <h2>Stonr Relay</h2>
        </div>
        <div id="section-list" class="section-list" role="listbox" aria-label="Settings sections"></div>
      </section>

      <button id="open-settings" class="footer-btn icon-btn rail-settings" type="button" title="Control app settings" aria-label="Control app settings">
        <img src="assets/settings-gear.svg" alt="Settings">
      </button>
    </aside>

    <div id="shell-divider" class="shell-divider" role="separator" aria-orientation="vertical" aria-label="Resize sections"></div>

    <main class="stage">
      <header class="toolbar">
        <h2 id="active-title">Relay Runtime</h2>
        <p id="active-subtitle" class="sub">Status, process control, and the effective relay configuration.</p>
        <div class="toolbar-actions">
          <button id="open-store-root" class="action icon-btn toolbar-icon" type="button" title="Open relay folder" aria-label="Open relay folder">
            <img src="assets/folder-open.svg" alt="">
          </button>
          <span id="relay-pill" class="status-pill neutral">Relay: unknown</span>
          <button id="relay-toggle" class="action primary" type="button" title="Start relay" aria-label="Start relay"></button>
        </div>
      </header>

      <section class="runtime-panel">
        <header class="runtime-head">
          <h3>Runtime</h3>
        </header>
        <div id="runtime-grid" class="kv-grid"></div>
      </section>

      <section id="section-content" class="section-stack"></section>
    </main>
  </div>

  <aside id="settings-drawer" class="drawer hidden" aria-label="Control app settings">
    <section class="drawer-panel">
      <header class="drawer-head">
        <h3>Control App</h3>
        <p class="sub">Desktop bridge state and the env file this console edits.</p>
        <button id="close-settings" class="action mini" type="button">Close</button>
      </header>

      <section class="drawer-body">
        <section class="drawer-section">
          <h4>Bridge</h4>
          <p id="bridge-copy" class="sub">Checking wizardry bridge.</p>
        </section>

        <section class="drawer-section env-path-section">
          <h4>Env File</h4>
          <label for="env-path">Path</label>
          <input id="env-path" type="text" spellcheck="false" placeholder="/absolute/path/to/.env">
        </section>

        <section class="drawer-section">
          <h4>Doctor</h4>
          <pre id="doctor-output" class="mono">Waiting for backend.</pre>
        </section>
      </section>
    </section>
  </aside>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="save-status" class="save-status" role="status" aria-live="polite" aria-atomic="true"></div>

  <script src="app.js?v=stonr-control-20260322a"></script>
</body>
</html>
